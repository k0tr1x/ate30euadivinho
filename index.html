<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Até 30 Eu Adivinho · Jogo Matemático</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b2b40 0%, #123b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,215,0,0.2) inset;
            width: 100%;
            max-width: 700px;
        }
        .card {
            background: #fefefe;
            border-radius: 36px;
            padding: 30px 24px;
            box-shadow: 0 12px 0 #0a1f2a, 0 20px 30px rgba(0,0,0,0.5);
            border: 2px solid #ffd966;
            transition: all 0.2s;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffd966;
            text-shadow: 3px 3px 0 #0e2f3f, 5px 5px 0 #00000055;
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
            word-break: break-word;
        }
        .subhead {
            text-align: center;
            color: #c9e9ff;
            font-weight: 500;
            background: #0f3448;
            display: inline-block;
            padding: 8px 28px;
            border-radius: 60px;
            margin: 0 auto 24px;
            font-size: 1.2rem;
            border: 1px solid #ffd96677;
            box-shadow: inset 0 2px 5px #00000033;
        }
        .screen {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .question-header {
            background: #2f6f8f;
            color: white;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 1.9rem;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 6px 0 #123b4e, 0 8px 12px black;
            border: 1px solid #ffd966;
            letter-spacing: 1px;
        }
        .number-list {
            background: #e8f3fa;
            border-radius: 48px;
            padding: 24px 16px;
            border: 3px dashed #2f6f8f;
            box-shadow: inset 0 0 0 4px white, 0 8px 0 #0e2f3f;
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 18px;
            margin: 10px 0 5px;
        }
        .number-list span {
            background: white;
            border-radius: 60px;
            padding: 8px 18px;
            border: 2px solid #1c556b;
            color: #0b2b40;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            box-shadow: 0 4px 0 #1c556b;
            transform: translateY(0);
            transition: 0.1s;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 10px 0;
        }
        button {
            background: #fedb7a;
            border: none;
            padding: 18px 34px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 800;
            color: #0b2b40;
            cursor: pointer;
            box-shadow: 0 7px 0 #9b731c, 0 8px 12px black;
            transition: 0.07s linear;
            border: 2px solid #ffffffcc;
            flex: 0 1 auto;
            min-width: 160px;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9b731c, 0 5px 10px black;
        }
        button:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 3px 0 #7a5b1f;
            pointer-events: none;
        }
        .quit-btn {
            background: #c9c9c9;
            color: #1f2f3a;
            box-shadow: 0 7px 0 #6b6b6b;
            font-size: 1.5rem;
            padding: 16px 28px;
        }
        .result-area {
            background: #d2ecb0;
            border-radius: 60px;
            padding: 28px;
            text-align: center;
            border: 3px solid #5f8b2c;
            box-shadow: inset 0 0 0 4px white, 0 8px 0 #2d511f;
        }
        .result-number {
            font-size: 7rem;
            font-weight: 900;
            color: #1f4f2b;
            line-height: 1;
            text-shadow: 4px 4px 0 #b0d47a;
            margin: 10px 0;
        }
        .restart-btn {
            background: #5fa7c7;
            color: white;
            box-shadow: 0 7px 0 #1f4f6e;
            font-size: 2rem;
            padding: 22px 40px;
            width: 100%;
        }
        .footer-message {
            color: #b6e2ff;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 20px;
            font-style: italic;
        }
        .lead-text {
            font-size: 1.5rem;
            color: #f0f9ff;
            background: #00000033;
            border-radius: 40px;
            padding: 18px;
            text-align: center;
        }
        .start-btn {
            background: #fedb7a;
            font-size: 2.3rem;
            padding: 25px 20px;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="card">
        <h1>🔢 ATÉ 30 <br>EU ADIVINHO</h1>
        <div class="subhead">🧠 pense em um número · 5 perguntas</div>

        <!-- dynamic content will be injected here -->
        <div id="gameScreen" class="screen">
            <!-- start screen initially -->
            <div class="lead-text">
                Pense em um número de 01 a 30.<br>
                Eu vou adivinhar com 5 perguntas!
            </div>
            <button id="startButton" class="start-btn">▶ INICIAR JOGO</button>
            <div style="text-align: center; color: #c9e9ff; margin-top: 15px;">
                <small>baseado no algoritmo de Anderson Misson (2016)</small>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- DADOS DO JOGO (listas idênticas ao original) ----------
        const perguntaListas = [
            [25, 15, 9, 5, 17, 19, 7, 1, 29, 27, 21, 11, 3, 23, 13],
            [18, 26, 7, 11, 30, 15, 23, 2, 10, 27, 14, 22, 3, 19, 6],
            [6, 21, 15, 22, 14, 28, 7, 4, 20, 5, 30, 13, 29, 23, 12],
            [25, 9, 12, 27, 10, 30, 14, 8, 24, 13, 26, 15, 29, 11, 28],
            [22, 18, 20, 26, 24, 30, 27, 16, 23, 21, 29, 17, 28, 19, 25]
        ];

        // pesos de cada pergunta: 1, 2, 4, 8, 16
        const pesos = [1, 2, 4, 8, 16];

        // estado atual da partida
        let currentQuestionIndex = 0;      // 0 a 4
        let soma = 0;
        let gameActive = false;            // se false, mostra tela inicial ou resultado

        // elementos
        const gameScreen = document.getElementById('gameScreen');

        // funções de renderização
        function mostrarTelaInicial(comMensagem = null) {
            gameActive = false;
            let mensagemExtra = comMensagem ? `<div style="background:#ffbaba; color:#a70000; padding:12px; border-radius:60px; margin-bottom:16px; font-weight:bold;">${comMensagem}</div>` : '';
            gameScreen.innerHTML = `
                <div class="lead-text">
                    ${mensagemExtra}
                    Pense em um número de 01 a 30.<br>
                    Eu vou adivinhar com 5 perguntas!
                </div>
                <button id="startButton" class="start-btn">▶ INICIAR JOGO</button>
                <div style="text-align: center; color: #c9e9ff; margin-top: 15px;">
                </div>
            `;
            document.getElementById('startButton').addEventListener('click', iniciarNovoJogo);
        }

        function iniciarNovoJogo() {
            // reinicia variáveis
            currentQuestionIndex = 0;
            soma = 0;
            gameActive = true;
            mostrarPergunta(currentQuestionIndex);
        }

        function mostrarPergunta(index) {
            if (!gameActive) return; // segurança

            if (index >= 5) {
                // já respondeu todas: mostrar resultado
                mostrarResultado();
                return;
            }

            const lista = perguntaListas[index];
            // formata números com dois dígitos (01, 02, ...)
            const numerosFormatados = lista.map(n => n < 10 ? '0' + n : '' + n).join('  ·  ');

            gameScreen.innerHTML = `
                <div class="question-header">❓ PERGUNTA ${index+1}/5</div>
                <div class="number-list">
                    ${lista.map(n => `<span>${n < 10 ? '0'+n : n}</span>`).join('')}
                </div>
                <div style="text-align:center; font-size:1.4rem; margin:8px 0; background:#154454; color:white; padding:8px; border-radius:40px;">
                    O número que você pensou está nesta lista?
                </div>
                <div class="actions">
                    <button id="yesBtn" class="yes-btn">👍 SIM (1)</button>
                    <button id="noBtn" class="no-btn">👎 NÃO (2)</button>
                </div>
                <div style="display:flex; justify-content:center;">
                    <button id="quitBtn" class="quit-btn">⏹️ SAIR (0)</button>
                </div>
                <div style="font-size:1rem; color:#aad0f0; margin-top:20px; text-align:center;">
                    aperte SIM se o número estiver na lista azul
                </div>
            `;

            document.getElementById('yesBtn').addEventListener('click', () => {
                if (!gameActive) return;
                // adiciona peso correspondente
                soma += pesos[index];
                avancarParaProximaPergunta();
            });

            document.getElementById('noBtn').addEventListener('click', () => {
                if (!gameActive) return;
                // não adiciona nada (soma +0)
                avancarParaProximaPergunta();
            });

            document.getElementById('quitBtn').addEventListener('click', () => {
                gameActive = false;
                mostrarTelaInicial('🛑 Você saiu do jogo. Até a próxima!');
            });
        }

        function avancarParaProximaPergunta() {
            if (!gameActive) return;
            currentQuestionIndex++;
            if (currentQuestionIndex < 5) {
                mostrarPergunta(currentQuestionIndex);
            } else {
                mostrarResultado();
            }
        }

        function mostrarResultado() {
            gameActive = false;  // partida encerrada
            let resultadoFinal = soma;
            let mensagem = '';
            let corFundo = '#d2ecb0';
            let numeroDisplay = resultadoFinal;

            // validação (original: se resultado <1 ou >30, mostra erro)
            if (resultadoFinal < 1 || resultadoFinal > 30) {
                mensagem = '⚠️ Olhe direito, é somente de 01 a 30.';
                corFundo = '#ffb5b5';
                numeroDisplay = '?';
            } else {
                mensagem = 'O NÚMERO QUE VOCÊ PENSOU É:';
            }

            const numeroFormatado = (resultadoFinal >= 1 && resultadoFinal <= 30) 
                ? (resultadoFinal < 10 ? '0' + resultadoFinal : resultadoFinal) 
                : '??';

            gameScreen.innerHTML = `
                <div class="result-area" style="background: ${corFundo};">
                    <div style="font-size:2rem; font-weight:600;">${mensagem}</div>
                    <div class="result-number">${numeroFormatado}</div>
                    <div style="font-size:1.3rem; margin: 10px 0 20px;">🔮 magia matemática</div>
                    <button id="restartBtn" class="restart-btn">🔄 JOGAR NOVAMENTE</button>
                    <div style="margin-top:20px;">
                        <button id="quitAfterResultBtn" class="quit-btn" style="font-size:1.3rem;">🚪 SAIR</button>
                    </div>
                </div>
            `;

            document.getElementById('restartBtn').addEventListener('click', () => {
                iniciarNovoJogo();
            });

            document.getElementById('quitAfterResultBtn').addEventListener('click', () => {
                mostrarTelaInicial('Até mais! 👋');
            });
        }

        // função para sair (chamada pelo botão sair e também no início)
        window.sairDoJogo = function() {
            gameActive = false;
            mostrarTelaInicial('Jogo encerrado.');
        };

        // Inicializa com a tela inicial
        mostrarTelaInicial();

        // botão "sair" durante jogo já está tratado nos eventos, 
        // mas também podemos expor uma função global se precisar.
    })();
</script>
<!-- 
    Algoritmo original de Anderson Misson (Visualg)
    Convertido para HTML/CSS/JS por assistente IA
    Todas as listas e pesos respeitam o código fonte fornecido.
-->
</body>
</html>
